<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="style.css" rel="stylesheet">
</head>
<body style="align-items: center; text-align: center; align-content: center;">
    <h1 style="margin: 70px; font-size: 70px;">404</h1>
    <p id="message">Stránka nenájdená.</p>
    <button onclick="location.href='index.html'" class="empty_btn" style="font-size: 14px; padding: 12px 40px; min-width: 0;">Domov</button>
    <script>
    let path = window.location.pathname;

    if (path.startsWith("/")) path = path.substring(1);
    if (!path) path = "Home";

    document.getElementById("message").textContent = `Stránka "${path}" nenájdená.`;
  </script>
</body>
</html>
